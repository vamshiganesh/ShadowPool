name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SEPOLIA_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com

  # ── Prover ──────────────────────────────────────────────────────────────────
  # Must build before the matcher — the matcher worker spawns prover/dist/service-entry.js
  prover:
    name: Prover — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prover

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prover/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ── Matcher service ─────────────────────────────────────────────────────────
  matcher:
    name: Matcher — typecheck + build
    runs-on: ubuntu-latest
    needs: prover          # prover dist must exist before integration tests
    defaults:
      run:
        working-directory: services/matcher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/matcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc
